# Docker Compose for AI Runner
#
# Usage:
#   Web GUI mode: docker compose run --rm --service-ports airunner
#                 then open http://localhost:5173
#   Headless mode: docker compose run --rm --service-ports airunner --headless
#
# Note: --service-ports is required to expose ports 8080 (API) and 5173 (Vite)
#
# This file uses relative paths so airunner can be located anywhere.

services:
  # Main AI Runner service - supports web GUI and headless modes
  airunner:
    build:
      context: .
      dockerfile: Dockerfile
    # Run as host user to avoid file permission issues
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Mount local airunner data folder (models, database, etc.)
      - ~/.local/share/airunner:/home/airunner/.local/share/airunner
      # Mount local huggingface cache
      - ~/.cache/huggingface:/home/airunner/.cache/huggingface
      # Mount source code for live development
      - ./services/src:/app/services/src:ro
      # Mount web client source for live editing
      - ./airunner_web_client:/app/airunner_web_client:ro
    ports:
      - "8080:8080"
      - "5173:5173"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/home/airunner
      - HF_HOME=/home/airunner/.cache/huggingface
      - AIRUNNER_DATA_DIR=/home/airunner/.local/share/airunner
      # NVIDIA
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    # Interactive mode
    stdin_open: true
    tty: true
    # Prevent 'docker compose up' from starting this service
    profiles:
      - manual
