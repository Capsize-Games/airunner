name: Native Runtime Sidecars

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-sidecars:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target-platform:
          - linux
          - windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mingw-w64 ninja-build

      - name: Build pinned sidecar bundle
        run: |
          ./scripts/build_runtime_sidecars.sh \
            --clean \
            --target-platform ${{ matrix.target-platform }}

      - name: Upload sidecar bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sidecars-${{ matrix.target-platform }}
          path: build/runtime-sidecars/${{ matrix.target-platform }}