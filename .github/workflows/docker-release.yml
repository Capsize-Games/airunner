name: Docker Release

on:
  push:
    branches:
      - master
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: headless
            profiles: core,llm-native,stt-native,art-python,tts-python
            tags: |
              ghcr.io/capsize-games/airunner/airunner:linux-headless
          - name: desktop
            profiles: core,llm-native,stt-native,art-python,tts-python,gui,computer-use
            tags: |
              ghcr.io/capsize-games/airunner/airunner:linux-desktop
              ghcr.io/capsize-games/airunner/airunner:linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ matrix.tags }}
          build-args: |
            AIRUNNER_ENABLE_CUDA=0
            AIRUNNER_INSTALL_PROFILES=${{ matrix.profiles }}
