name: Hybrid Runtime CI

on:
  pull_request:
    branches: [master, llm-refactor, hybrid-runtime-foundation]
  push:
    branches: [master, llm-refactor, hybrid-runtime-foundation]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"

jobs:
  runtime-contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e server/

      - name: Run runtime contract tests
        run: |
          python -m pytest \
            server/src/airunner_services/tests/ \
            -v \
            --tb=short \
            -m "not gpu and not gui and not eval and not integration" \
            --junitxml=runtime-contracts.xml 2>&1 | tee runtime-contracts.txt
        env:
          AIRUNNER_HEADLESS: "1"
          AIRUNNER_HTTP_PORT: "8188"
          AIRUNNER_HTTP_HOST: "127.0.0.1"

      - name: Upload runtime contract results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-contract-results
          path: |
            runtime-contracts.xml
            runtime-contracts.txt

  launcher-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install launcher build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e server/

      - name: Run launcher smoke tests
        run: |
          python -m pytest \
            server/tests/ \
            -v \
            --tb=short \
            -m "not gpu and not gui and not eval" \
            --junitxml=launcher-smoke.xml 2>&1 | tee launcher-smoke.txt

      - name: Upload launcher smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launcher-smoke-results
          path: |
            launcher-smoke.xml
            launcher-smoke.txt

  eval-tests:
    runs-on: ubuntu-latest
    needs: runtime-contract-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e server/
      
      - name: Run eval tests
        run: |
          pytest src/airunner/components/eval/tests/ \
            -v \
            -m eval \
            --timeout=300 \
            --tb=short \
            --junitxml=pytest-report.xml | tee pytest-output.txt
        env:
          AIRUNNER_HEADLESS: "1"
          AIRUNNER_HTTP_PORT: "8188"
          AIRUNNER_HTTP_HOST: "127.0.0.1"
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-test-results-${{ env.PYTHON_VERSION }}
          path: |
            pytest-report.xml
            pytest-output.txt
