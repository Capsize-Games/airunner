name: PyPI And Installable Bundles

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  build-python-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload Python distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

      - name: Publish package
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  build-sidecars:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target-platform:
          - linux
          - windows

    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mingw-w64 ninja-build

      - name: Build pinned sidecar bundle
        run: |
          ./scripts/build_runtime_sidecars.sh \
            --clean \
            --target-platform ${{ matrix.target-platform }}

      - name: Upload sidecar bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sidecars-${{ matrix.target-platform }}
          path: build/runtime-sidecars/${{ matrix.target-platform }}

  build-linux-installers:
    needs: build-sidecars
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install native packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build curl

      - name: Build Linux launcher
        run: ./scripts/build_airunner_launcher.sh --clean --target-platform linux

      - name: Download Linux sidecar bundle
        uses: actions/download-artifact@v4
        with:
          name: runtime-sidecars-linux
          path: build/runtime-sidecars/linux

      - name: Build Linux embedded bundle
        env:
          PYTHONPATH: src
        run: |
          python src/airunner/bin/build_end_user_bundle.py \
            --target-platform linux \
            --clean \
            --launcher-binary build/airunner-launcher/airunner \
            --sidecar-root build/runtime-sidecars/linux

      - name: Package Linux AppImage
        run: |
          ./scripts/package_linux_appimage.sh \
            --bundle-dir build/end-user-bundles/linux/desktop \
            --output-dir dist

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            dist/*.tar.gz
            dist/*.AppImage

  build-windows-installers:
    needs: build-sidecars
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Download Windows sidecar bundle
        uses: actions/download-artifact@v4
        with:
          name: runtime-sidecars-windows
          path: build/runtime-sidecars/windows

      - name: Build Windows launcher
        shell: pwsh
        run: |
          cmake -S native/airunner_launcher -B build/airunner-launcher-windows -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/airunner-launcher-windows --config Release

      - name: Build Windows embedded bundle
        env:
          PYTHONPATH: src
        shell: pwsh
        run: |
          python src/airunner/bin/build_end_user_bundle.py `
            --target-platform windows `
            --clean `
            --launcher-binary build/airunner-launcher-windows/airunner.exe `
            --sidecar-root build/runtime-sidecars/windows

      - name: Package Windows NSIS installer
        shell: pwsh
        run: |
          ./scripts/package_windows_nsis.ps1 -BundleDir build/end-user-bundles/windows/desktop

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.zip
            dist/windows-installer/*.exe

  publish-release-assets:
    if: github.event_name == 'release'
    needs:
      - build-python-package
      - build-linux-installers
      - build-windows-installers
    runs-on: ubuntu-latest

    steps:
      - name: Download Python distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-assets/python-dist

      - name: Download Linux installers
        uses: actions/download-artifact@v4
        with:
          name: linux-installers
          path: release-assets/linux

      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: release-assets/windows

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/python-dist/*
            release-assets/linux/*
            release-assets/windows/*
          overwrite_files: true
