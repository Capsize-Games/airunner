name: Build Base Images

on:
  push:
    paths:
      - 'server/package_metadata.py'
      - 'docker/builder.Dockerfile'
      - 'docker/deps.Dockerfile'
      - '.github/workflows/build-base-images.yml'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to GHCR'
        type: boolean
        default: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: capsize-games/airunner
  # Build revision for the llama-cuda-builder image. Bump this (and the
  # matching LLAMA_BUILDER_REV in docker/Dockerfile) whenever the builder's
  # compile flags change but the llama-cpp-python version does not, so the
  # GHCR tag changes and stale caches don't serve the old wheel.
  LLAMA_BUILDER_REV: "2"

jobs:
  # Build and (optionally) push the CUDA llama-cpp-python wheel image.
  builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract llama-cpp-python version
        id: version
        run: |
          VER=$(grep -oP 'llama-cpp-python==\K[0-9.]+' server/package_metadata.py | head -1)
          echo "version=${VER:-0.3.26}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/builder.Dockerfile
          build-args: |
            LLAMA_CPP_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/llama-cuda-builder:v${{ steps.version.outputs.version }}-${{ env.LLAMA_BUILDER_REV }}
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images }}

  # Build and (optionally) push the frozen server-deps image.
  deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Python version from base image
        id: pyver
        run: |
          PY=$(grep -oP 'FROM python:\K[0-9.]+' docker/deps.Dockerfile | head -1)
          echo "python=${PY:-3.13}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server-deps
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/deps.Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/server-deps:py${{ steps.pyver.outputs.python }}
          push: ${{ github.event_name == 'push' || github.event.inputs.push_images }}
